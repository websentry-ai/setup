# Release pipeline for the macOS runtime (WEB-4789): tag runtime-v* in,
# stapled pkg + tar.gz on S3 + GitHub Release out, zero manual steps.
#
# Signing / notarization / S3 are each independently GATED on their secrets
# and vars being configured, so the pipeline runs end-to-end UNSIGNED today
# (certs pending) and lights up stage by stage as credentials land in the
# `release` environment. Configure that environment with required reviewers
# = the SOC 2 production-approver list.
#
# Secrets (GitHub environment `release` ONLY — never repo-level):
#   APPLE_CERT_APPLICATION_P12 / APPLE_CERT_APPLICATION_PASSWORD   (base64 p12)
#   APPLE_APP_SIGNING_IDENTITY      "Developer ID Application: ... (TEAMID)"
#   APPLE_CERT_INSTALLER_P12 / APPLE_CERT_INSTALLER_PASSWORD
#   APPLE_INSTALLER_SIGNING_IDENTITY "Developer ID Installer: ... (TEAMID)"
#   APPLE_TEAM_ID
#   APPLE_NOTARY_KEY_P8 / APPLE_NOTARY_KEY_ID / APPLE_NOTARY_ISSUER_ID
#   DISCOVERY_CHECKOUT_TOKEN        read access to coding-discovery-tool
#   ARTIFACTS_AWS_ACCESS_KEY_ID / ARTIFACTS_AWS_SECRET_ACCESS_KEY
#       write access to the release-artifacts bucket below
#
# Artifacts publish to s3://unbound-release-artifacts/macos/<version>/ —
# that bucket REJECTS overwrites (conditional writes). Re-publishing an
# existing version is a hard error demanding a version bump, never a retry.
#
# Builder choice (WEB-4804 EDR bake-off): workflow_dispatch accepts
# builder=pyinstaller (default) | nuitka. Tag releases ALWAYS build with
# PyInstaller; the Nuitka path (packaging/scripts/build-nuitka.sh, per-arch
# + lipo merge, Apache-2.0 Nuitka 2.8.x only) produces dist/ with the same
# layout, so the lipo gate / signing / smoke / pkg stages below run on it
# unchanged. Nuitka artifacts carry a -nuitka suffix so both builders'
# outputs can sit side by side for the EDR rehearsal.

name: release-macos-runtime

on:
  push:
    tags: ["runtime-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (and publish, if publish=true). Dry-run default builds+smokes only."
        required: true
        default: "0.0.0-dev"
      builder:
        description: "Bundle builder (WEB-4804 EDR bake-off; tag releases always use pyinstaller)"
        type: choice
        options:
          - pyinstaller
          - nuitka
        default: pyinstaller
      publish:
        description: "Publish to S3 + latest/onboard.sh + GitHub Release. Required to ship a Nuitka build (tag pushes always publish)."
        type: boolean
        default: false

permissions:
  contents: write # create the GitHub Release

env:
  ARTIFACTS_BUCKET: unbound-release-artifacts
  ARTIFACTS_REGION: us-west-2

concurrency:
  group: release-macos-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Linux runtime lane (per-arch tarball, Nuitka) ------------------------
  # ONE matrix job builds linux/amd64 + linux/arm64 natively with Nuitka
  # --standalone (build-nuitka.sh detects Linux and skips the macOS
  # universal2/lipo path) and uploads each arch's tarball + .sha256 as a
  # WORKFLOW ARTIFACT only. The macOS `release` job (which `needs` this one)
  # downloads them and publishes them through its single existing S3 loop under
  # macos/<version>/ — so there is no separate Linux S3 upload and no second
  # bucket prefix to permission/own.
  #
  # continue-on-error: a Linux build failure (or an unavailable arm64 runner)
  # must NEVER block the proven macOS release. A missing arch -> the macOS job
  # finds no tarball -> onboard.sh token renders empty -> that arch fails
  # preflight cleanly ("no published runtime") while macOS + the other arch
  # ship normally. Gated like the macOS lane: placeholder discovery on tokenless
  # dry-runs, real pinned checkout on tag/publish.
  #
  # NOTE: unproven — validate with a workflow_dispatch dry-run (publish=false)
  # before a tag. arm64 needs GitHub-hosted arm64 runners enabled for the org.
  linux:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    environment: release
    timeout-minutes: 60
    continue-on-error: true   # never block the macOS release on the Linux lane
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure (version + gates)
        id: cfg
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISH: ${{ inputs.publish }}
          HAS_DISCOVERY_TOKEN: ${{ secrets.DISCOVERY_CHECKOUT_TOKEN != '' }}
          HAS_S3: ${{ secrets.ARTIFACTS_AWS_ACCESS_KEY_ID != '' && secrets.ARTIFACTS_AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#runtime-v}"; publish=true
          else
            version="$INPUT_VERSION"; publish="${INPUT_PUBLISH:-false}"
          fi
          # Same digit-led semver guard as the macOS lane (the version becomes a
          # dir under /opt/unbound and an S3 key).
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version '$version' is not digit-led semver"; exit 1
          fi
          if [[ "$publish" == "true" && "$HAS_DISCOVERY_TOKEN" != "true" ]]; then
            echo "::error::publish requires DISCOVERY_CHECKOUT_TOKEN"; exit 1
          fi
          if [[ "$publish" == "true" && "$HAS_S3" != "true" ]]; then
            echo "::error::publish requires ARTIFACTS_AWS_* credentials"; exit 1
          fi
          # Version-lockstep (mirror the macOS cfg added in main): both binaries'
          # __version__ must equal the release version. Fail fast BEFORE the
          # Nuitka build so a forgotten bump can't upload an orphaned,
          # mis-versioned tarball to the immutable bucket.
          hook_ver="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' binary/src/unbound_hook/__init__.py)"
          disc_ver="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' packaging/unbound_discovery_entry.py)"
          if [[ "$hook_ver" != "$version" || "$disc_ver" != "$version" ]]; then
            msg="version mismatch: release=$version unbound_hook=$hook_ver unbound_discovery=$disc_ver — bump BOTH __version__ to $version"
            if [[ "$publish" == "true" ]]; then echo "::error::$msg"; exit 1; else echo "::warning::$msg (dry-run)"; fi
          fi
          discovery_sha="$(awk -F= '$1=="SOURCE_SHA"{print $2}' packaging/discovery.lock)"
          lock_python="$(awk -F= '$1=="PYTHON_VERSION"{print $2}' packaging/discovery.lock)"
          [[ "$discovery_sha" =~ ^[0-9a-f]{40}$ ]] \
            || { echo "::error::SOURCE_SHA is not a 40-char SHA: '$discovery_sha'"; exit 1; }
          [[ -n "$lock_python" ]] || { echo "::error::PYTHON_VERSION missing from discovery.lock"; exit 1; }
          {
            echo "version=$version"
            echo "publish=$publish"
            echo "discovery_token=$HAS_DISCOVERY_TOKEN"
            echo "discovery_sha=$discovery_sha"
            echo "lock_python=$lock_python"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout coding-discovery-tool at pinned SHA
        if: steps.cfg.outputs.discovery_token == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: websentry-ai/coding-discovery-tool
          ref: ${{ steps.cfg.outputs.discovery_sha }}
          token: ${{ secrets.DISCOVERY_CHECKOUT_TOKEN }}
          path: discovery-src

      - name: Note skipped discovery checkout
        if: steps.cfg.outputs.discovery_token != 'true'
        run: echo "::warning::DISCOVERY_CHECKOUT_TOKEN not configured — placeholder discovery build (dry-run only)"

      - name: Install pinned Nuitka (hash-verified) + patchelf
        env:
          LOCK_PYTHON: ${{ steps.cfg.outputs.lock_python }}
        run: |
          set -euo pipefail
          py_full="$(python3 -c 'import platform;print(platform.python_version())')"
          [[ "${py_full%.*}" == "3.12" ]] || { echo "::error::need python 3.12, have $py_full"; exit 1; }
          # macOS pins the interpreter EXACTLY (install-python.sh); the Linux
          # runner provides its own patch, so warn (don't fail) on drift to
          # leave a trace. TODO: pin the exact CPython patch on Linux.
          if [[ "$py_full" != "$LOCK_PYTHON" ]]; then
            echo "::warning::Linux build interpreter $py_full != discovery.lock PYTHON_VERSION $LOCK_PYTHON (runner-provided, not pinned)"
          fi
          echo "Linux build interpreter: $py_full (discovery.lock: $LOCK_PYTHON)"
          # Nuitka --standalone COMPILES to C: it needs a C toolchain
          # (build-essential) and the CPython dev headers (python3-dev →
          # Python.h) for the interpreter the venv was created from, plus
          # patchelf to set the bundle RPATH. None are guaranteed on the
          # arm64 runner image, so install explicitly.
          sudo apt-get update -qq && sudo apt-get install -y -qq patchelf python3-dev build-essential
          # Mirror the macOS Nuitka install: setuptools FIRST, then the sdist with
          # --no-build-isolation so it builds against that pinned setuptools.
          python3 -m venv .build-venv-nuitka
          grep '^setuptools' packaging/requirements-nuitka-build.txt > "$RUNNER_TEMP/setuptools-pin.txt"
          ./.build-venv-nuitka/bin/pip install --require-hashes --no-deps -r "$RUNNER_TEMP/setuptools-pin.txt"
          ./.build-venv-nuitka/bin/pip install --require-hashes --no-deps --no-build-isolation \
            -r packaging/requirements-nuitka-build.txt
          ./.build-venv-nuitka/bin/python -m nuitka --version

      # Native Nuitka build (build-nuitka.sh detects Linux); tar with the SAME
      # layout the macOS pkg installs (unbound-hook/ + unbound-discovery/).
      - name: Build tarball (Nuitka)
        env:
          HAS_DISCOVERY_SRC: ${{ steps.cfg.outputs.discovery_token }}
          VERSION: ${{ steps.cfg.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          [[ "$HAS_DISCOVERY_SRC" == "true" ]] && export UNBOUND_DISCOVERY_SRC="$GITHUB_WORKSPACE/discovery-src"
          NUITKA_PYTHON="$GITHUB_WORKSPACE/.build-venv-nuitka/bin/python" \
            ./packaging/scripts/build-nuitka.sh dist
          for b in unbound-hook unbound-discovery; do
            [[ -x "dist/$b/$b" ]] || { echo "::error::missing bundle dist/$b/$b"; exit 1; }
            echo "smoke: $b --version -> $("dist/$b/$b" --version)"
          done
          tar="unbound-runtime-$VERSION-linux-$ARCH.tar.gz"
          mkdir -p out
          tar -czf "out/$tar" -C dist unbound-hook unbound-discovery
          ( cd out && sha256sum "$tar" > "$tar.sha256" )

      # The tarball + .sha256 ride out ONLY as a workflow artifact. The macOS
      # `release` job downloads them and publishes them to S3 through its single
      # existing upload loop (under macos/<version>/) — so there is no separate
      # Linux S3 upload and no second bucket prefix to permission/own.
      - name: Upload build artifact (always, incl. dry-runs)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-${{ matrix.arch }}
          path: out/
          retention-days: 14

  release:
    # macos-14 = Apple Silicon GitHub-hosted runner (with Rosetta, so the
    # smoke test can execute the x86_64 slice too).
    needs: [linux]
    runs-on: macos-14
    environment: release
    timeout-minutes: 180 # must exceed the 2h notary --wait (WEB-4802) plus build/sign/test time

    steps:
      # SHA-pinned (I1): this job holds signing material; a hijacked action
      # tag must not be able to run code here. SHA = tag v6.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure (version + stage gates)
        id: cfg
        env:
          HAS_APP_CERT: ${{ secrets.APPLE_CERT_APPLICATION_P12 != '' && secrets.APPLE_APP_SIGNING_IDENTITY != '' }}
          HAS_INSTALLER_CERT: ${{ secrets.APPLE_CERT_INSTALLER_P12 != '' && secrets.APPLE_INSTALLER_SIGNING_IDENTITY != '' }}
          HAS_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}
          HAS_NOTARY: ${{ secrets.APPLE_NOTARY_KEY_P8 != '' && secrets.APPLE_NOTARY_KEY_ID != '' && secrets.APPLE_NOTARY_ISSUER_ID != '' }}
          HAS_DISCOVERY_TOKEN: ${{ secrets.DISCOVERY_CHECKOUT_TOKEN != '' }}
          HAS_S3: ${{ secrets.ARTIFACTS_AWS_ACCESS_KEY_ID != '' && secrets.ARTIFACTS_AWS_SECRET_ACCESS_KEY != '' }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILDER: ${{ inputs.builder }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#runtime-v}"
            publish=true
          else
            version="$INPUT_VERSION"
            publish="${INPUT_PUBLISH:-false}"
          fi

          # Builder choice (WEB-4804 EDR bake-off). Tag releases ALWAYS use
          # PyInstaller — the Nuitka path is reachable only via
          # workflow_dispatch, so the fleet release path is unaffected until
          # the bake-off concludes and a deliberate default change lands.
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            builder="pyinstaller"
          else
            builder="${INPUT_BUILDER:-pyinstaller}"
          fi
          if [[ "$builder" != "pyinstaller" && "$builder" != "nuitka" ]]; then
            echo "::error::unknown builder '$builder'"
            exit 1
          fi
          # Artifact names carry the builder so both can exist side by side
          # for the EDR rehearsal; the default builder keeps today's names.
          builder_suffix=""
          [[ "$builder" == "nuitka" ]] && builder_suffix="-nuitka"
          # A tag always builds pyinstaller (above), so a non-pyinstaller publish
          # can only come from a deliberate workflow_dispatch with publish=true —
          # that is how a Nuitka build ships. Allow it, but make it loud: the
          # latest/onboard.sh alias the fleet installs from will serve it.
          if [[ "$publish" == "true" && "$builder" != "pyinstaller" ]]; then
            echo "::warning::publishing a '$builder' build — fleet onboard.sh (latest alias) will serve it"
          fi
          [[ -n "$version" ]] || { echo "::error::could not derive version"; exit 1; }
          # Digit-led semver ONLY (script-injection guard + path sanity):
          # tag names can legally contain ;, $(), | etc., and a loose charset
          # would still admit junk like '..', '.', or 'current' that later
          # becomes a directory name under /opt/unbound.
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version '$version' is not digit-led semver (X.Y.Z with optional -/+ suffix)"
            exit 1
          fi

          # Fail fast on a version-lockstep mismatch BEFORE the ~5-min
          # build+sign+notarize. unbound-hook and unbound-discovery carry their
          # own __version__ and the install-test asserts each binary self-reports
          # the release version; checking the source here turns a forgotten bump
          # into a seconds-long failure instead of one after notarization.
          hook_ver="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' binary/src/unbound_hook/__init__.py)"
          disc_ver="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' packaging/unbound_discovery_entry.py)"
          if [[ "$hook_ver" != "$version" || "$disc_ver" != "$version" ]]; then
            msg="version mismatch: release=$version unbound_hook=$hook_ver unbound_discovery=$disc_ver — bump BOTH __version__ (binary/src/unbound_hook/__init__.py + packaging/unbound_discovery_entry.py) to $version"
            if [[ "$publish" == "true" ]]; then echo "::error::$msg"; exit 1; else echo "::warning::$msg (dry-run)"; fi
          fi

          sign=$HAS_APP_CERT
          pkg_sign=false; notarize=false
          [[ "$sign" == "true" && "$HAS_INSTALLER_CERT" == "true" ]] && pkg_sign=true
          [[ "$pkg_sign" == "true" && "$HAS_NOTARY" == "true" ]] && notarize=true

          # A signed pkg whose onboard.sh skips the Team ID assert is a
          # contradiction: pkg signing REQUIRES the Team ID to be configured.
          if [[ "$pkg_sign" == "true" && "$HAS_TEAM_ID" != "true" ]]; then
            echo "::error::APPLE_TEAM_ID must be set whenever installer signing is configured — an empty Team ID assert in a signed release is not allowed"
            exit 1
          fi

          # A real (tag) release with partial credentials is a misconfig we
          # refuse, not a stage we silently skip: shipping an unsigned or
          # unnotarized pkg to the fleet must be impossible by accident.
          if [[ "$publish" == "true" && "$notarize" != "true" ]]; then
            echo "::error::tag release requires full signing+notarization secrets (have: app-cert=$sign installer-cert=$HAS_INSTALLER_CERT notary=$HAS_NOTARY). Dry-run via workflow_dispatch instead."
            exit 1
          fi
          # Same strictness for publishing: the rendered onboard.sh points
          # the whole fleet at the S3 artifact URL, so a tag release without
          # upload credentials would bake a URL that 404s.
          if [[ "$publish" == "true" && "$HAS_S3" != "true" ]]; then
            echo "::error::tag release requires ARTIFACTS_AWS_ACCESS_KEY_ID/ARTIFACTS_AWS_SECRET_ACCESS_KEY in the release environment. Dry-run via workflow_dispatch instead."
            exit 1
          fi
          # A tag release must build the REAL discovery binary from the
          # pinned checkout — the placeholder fallback is dry-run only (and
          # the install-test version assert would reject it anyway).
          if [[ "$publish" == "true" && "$HAS_DISCOVERY_TOKEN" != "true" ]]; then
            echo "::error::tag release requires DISCOVERY_CHECKOUT_TOKEN (pinned coding-discovery-tool checkout). Dry-run via workflow_dispatch instead."
            exit 1
          fi

          artifact_base="https://$ARTIFACTS_BUCKET.s3.$ARTIFACTS_REGION.amazonaws.com/macos/$version"

          # discovery.lock is KEY=VALUE (canonical format from WEB-4787).
          discovery_sha="$(awk -F= '$1=="SOURCE_SHA"{print $2}' packaging/discovery.lock)"
          lock_python="$(awk -F= '$1=="PYTHON_VERSION"{print $2}' packaging/discovery.lock)"
          lock_pyinstaller="$(awk -F= '$1=="PYINSTALLER_VERSION"{print $2}' packaging/discovery.lock)"
          if ! [[ "$discovery_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::SOURCE_SHA in packaging/discovery.lock is not a full 40-char SHA: '$discovery_sha'"
            exit 1
          fi

          {
            echo "version=$version"
            echo "publish=$publish"
            echo "builder=$builder"
            echo "sign=$sign"
            echo "pkg_sign=$pkg_sign"
            echo "notarize=$notarize"
            echo "s3=$HAS_S3"
            echo "discovery_token=$HAS_DISCOVERY_TOKEN"
            echo "pkg_name=unbound-runtime-$version$builder_suffix.pkg"
            echo "tar_name=unbound-runtime-$version$builder_suffix.tar.gz"
            echo "artifact_name=unbound-runtime-$version$builder_suffix"
            echo "artifact_url=$artifact_base/unbound-runtime-$version$builder_suffix.pkg"
            echo "discovery_sha=$discovery_sha"
            echo "lock_python=$lock_python"
            echo "lock_pyinstaller=$lock_pyinstaller"
          } >> "$GITHUB_OUTPUT"
          echo "version=$version publish=$publish builder=$builder sign=$sign pkg_sign=$pkg_sign notarize=$notarize s3=$HAS_S3"

      # Pinned-SHA checkout (packaging/discovery.lock) so each release is
      # reproducible from this repo's history. Gated: the placeholder build
      # doesn't read the checkout yet; Stream B's spec will, at which point
      # DISCOVERY_CHECKOUT_TOKEN becomes mandatory.
      - name: Checkout coding-discovery-tool at pinned SHA
        if: steps.cfg.outputs.discovery_token == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: websentry-ai/coding-discovery-tool
          ref: ${{ steps.cfg.outputs.discovery_sha }}
          token: ${{ secrets.DISCOVERY_CHECKOUT_TOKEN }}
          path: discovery-src

      - name: Note skipped discovery checkout
        if: steps.cfg.outputs.discovery_token != 'true'
        run: echo "::warning::DISCOVERY_CHECKOUT_TOKEN not configured — skipping pinned discovery checkout (placeholder build only)"

      # Pinned python.org universal2 CPython — deliberately NOT
      # actions/setup-python (thin, non-relocatable build; cannot produce
      # universal2 PyInstaller bundles).
      - name: Install pinned universal2 CPython
        run: ./packaging/scripts/install-python.sh

      - name: Install pinned PyInstaller (hash-verified)
        if: steps.cfg.outputs.builder == 'pyinstaller'
        env:
          LOCK_PYTHON: ${{ steps.cfg.outputs.lock_python }}
          LOCK_PYINSTALLER: ${{ steps.cfg.outputs.lock_pyinstaller }}
        run: |
          set -euo pipefail
          source packaging/versions.env
          # versions.env (installer URL+sha) and discovery.lock (KEY=VALUE)
          # must agree — fail loud if one was bumped without the other.
          actual_py="$("$PYTHON_BIN" --version | awk '{print $2}')"
          if [[ "$actual_py" != "$LOCK_PYTHON" ]]; then
            echo "::error::pinned interpreter is $actual_py but discovery.lock says PYTHON_VERSION=$LOCK_PYTHON"
            exit 1
          fi
          "$PYTHON_BIN" -m venv .build-venv
          ./.build-venv/bin/pip install --require-hashes --no-deps -r packaging/requirements-build.txt
          actual_pi="$(./.build-venv/bin/pyinstaller --version)"
          if [[ "$actual_pi" != "$LOCK_PYINSTALLER" ]]; then
            echo "::error::installed PyInstaller $actual_pi but discovery.lock says PYINSTALLER_VERSION=$LOCK_PYINSTALLER"
            exit 1
          fi

      # --- Nuitka builder (WEB-4804 EDR bake-off; workflow_dispatch only) ---
      # ccache + Nuitka's object cache make the two C-compilation passes
      # (arm64 + x86_64) tolerable on repeat runs. SHA-pinned like every
      # other action in this job (I1).
      - name: Restore Nuitka compilation cache (ccache)
        if: steps.cfg.outputs.builder == 'nuitka'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .nuitka-cache
          # EXACT-MATCH ONLY — deliberately no restore-keys (WEB-4804, F1/M1).
          # This cache feeds object files into a C compile whose output is
          # later codesigned. A restore-keys prefix would let ANY branch's or
          # PR's cache be restored into this job (cache scope is the whole
          # repo), poisoning the compiled bytes. A cache miss just means a
          # slower clean compile — acceptable. This cache MUST stay exact-match,
          # and pinning ccache itself (see the TODO in the install step below)
          # is a precondition before Nuitka could ever become the publish/
          # default builder.
          key: nuitka-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packaging/requirements-nuitka-build.txt', 'packaging/versions.env') }}

      - name: Install pinned Nuitka (hash-verified) + ccache
        if: steps.cfg.outputs.builder == 'nuitka'
        env:
          LOCK_PYTHON: ${{ steps.cfg.outputs.lock_python }}
        run: |
          set -euo pipefail
          source packaging/versions.env
          # versions.env (installer URL+sha) and discovery.lock (KEY=VALUE)
          # must agree — fail loud if one was bumped without the other. Same
          # cross-assert the PyInstaller install step runs, replicated here so
          # a mismatched python bump is caught on nuitka runs too (WEB-4804, E).
          actual_py="$("$PYTHON_BIN" --version | awk '{print $2}')"
          if [[ "$actual_py" != "$LOCK_PYTHON" ]]; then
            echo "::error::pinned interpreter is $actual_py but discovery.lock says PYTHON_VERSION=$LOCK_PYTHON"
            exit 1
          fi
          # ccache for Nuitka's C compile step; macos-14 ships clang but not
          # ccache. Nuitka finds it on PATH and keeps its object cache under
          # NUITKA_CACHE_DIR (restored above).
          # TODO(WEB-4804): pin ccache before promoting Nuitka past the
          # dispatch-only bake-off — this is the only unpinned executable
          # touching artifact bytes in an otherwise fully hash-pinned,
          # signed-binary compile path. Acceptable today ONLY because this lane
          # is workflow_dispatch-only and publish-blocked (tag releases hard-
          # fail on builder=nuitka in the cfg step).
          brew list ccache >/dev/null 2>&1 || brew install ccache
          "$PYTHON_BIN" -m venv .build-venv-nuitka
          # Nuitka ships as an sdist: install the pinned setuptools FIRST,
          # then build the sdist with --no-build-isolation so it builds with
          # that pinned setuptools instead of an unpinned PyPI download.
          grep '^setuptools' packaging/requirements-nuitka-build.txt > "$RUNNER_TEMP/setuptools-pin.txt"
          ./.build-venv-nuitka/bin/pip install --require-hashes --no-deps \
            -r "$RUNNER_TEMP/setuptools-pin.txt"
          ./.build-venv-nuitka/bin/pip install --require-hashes --no-deps \
            --no-build-isolation -r packaging/requirements-nuitka-build.txt
          # Version + free-tier (Apache-2.0) asserts live in build-nuitka.sh.
          ./.build-venv-nuitka/bin/python -m nuitka --version

      - name: Build bundles with Nuitka (per-arch + lipo merge)
        if: steps.cfg.outputs.builder == 'nuitka'
        env:
          HAS_DISCOVERY_SRC: ${{ steps.cfg.outputs.discovery_token }}
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
        run: |
          set -euo pipefail
          # Same source-selection contract as the PyInstaller step below:
          # pinned checkout when the token is configured, placeholder
          # discovery only on tokenless dry-runs (tag releases hard-require
          # the token in cfg — and can never reach this step anyway).
          if [[ "$HAS_DISCOVERY_SRC" == "true" ]]; then
            export UNBOUND_DISCOVERY_SRC="$GITHUB_WORKSPACE/discovery-src"
          else
            echo "::warning::building PLACEHOLDER unbound-discovery (no DISCOVERY_CHECKOUT_TOKEN) — dry-run only"
          fi
          NUITKA_PYTHON=./.build-venv-nuitka/bin/python \
            ./packaging/scripts/build-nuitka.sh dist

      - name: Build bundles from committed .spec files
        if: steps.cfg.outputs.builder == 'pyinstaller'
        env:
          HAS_DISCOVERY_SRC: ${{ steps.cfg.outputs.discovery_token }}
        run: |
          set -euo pipefail
          # Real Stream A spec (WEB-4786): vendored hook/MDM sources + hidden
          # imports live in binary/unbound-hook.spec (single source of truth;
          # the Nuitka builder parses the same file). Spec-relative paths
          # resolve from binary/, so invoking from the repo root is fine.
          ./.build-venv/bin/pyinstaller --noconfirm --distpath dist --workpath build \
            binary/unbound-hook.spec
          # Canonical discovery spec (WEB-4787) builds from the pinned
          # checkout; the placeholder spec exists ONLY for tokenless
          # workflow_dispatch dry-runs (tag releases hard-require the token
          # in cfg, and the install-test version assert rejects placeholders).
          if [[ "$HAS_DISCOVERY_SRC" == "true" ]]; then
            UNBOUND_DISCOVERY_SRC="$GITHUB_WORKSPACE/discovery-src" \
              ./.build-venv/bin/pyinstaller --noconfirm --distpath dist --workpath build \
              packaging/unbound-discovery.spec
          else
            echo "::warning::building PLACEHOLDER unbound-discovery (no DISCOVERY_CHECKOUT_TOKEN) — dry-run only"
            ./.build-venv/bin/pyinstaller --noconfirm --distpath dist --workpath build \
              packaging/specs/unbound-discovery.spec
          fi

      - name: Lipo gate (every Mach-O universal2)
        run: ./packaging/scripts/lipo-gate.sh dist/unbound-hook dist/unbound-discovery

      # Vendored-import parity gate (WEB-4786). The hooks run as ROOT on the
      # fleet and fail OPEN by design: a hook bundle whose vendored module
      # tree is missing/corrupt silently STOPS enforcing — invisible at
      # runtime, so CI is the only place it can be caught. The 104-test
      # CLI-boundary suite pipes every tool x event through the freshly built
      # bundle and asserts byte-for-byte parity with `python3 <tool>/unbound.py`
      # (stdout + exit code), which only holds if every vendored module
      # actually imported and ran. This runs on BOTH the tag path and the
      # workflow_dispatch dry-run, and BEFORE any signing/publish — a failure
      # fails the build before a broken bundle can be signed or shipped.
      #
      # Builder-agnostic: it validates whatever landed at
      # dist/unbound-hook/unbound-hook, so the Nuitka builder (PR #132)
      # inherits this coverage with no change.
      - name: Install pinned pytest (hash-verified) for the parity suite
        run: |
          set -euo pipefail
          # PyInstaller builds .build-venv; Nuitka builds .build-venv-nuitka. Use
          # whichever the active builder created so the parity suite has a pip.
          VENV=$([ "${{ steps.cfg.outputs.builder }}" = "nuitka" ] && echo .build-venv-nuitka || echo .build-venv)
          "$VENV/bin/pip" install --require-hashes --no-deps -r packaging/requirements-test.txt

      - name: Parity gate — 104-test CLI-boundary suite vs built hook bundle
        env:
          UNBOUND_HOOK_BINARY: ${{ github.workspace }}/dist/unbound-hook/unbound-hook
        run: |
          set -euo pipefail
          VENV=$([ "${{ steps.cfg.outputs.builder }}" = "nuitka" ] && echo .build-venv-nuitka || echo .build-venv)
          "$VENV/bin/python" -m pytest binary/tests/ -q

      - name: Import Developer ID certs into throwaway keychain
        if: steps.cfg.outputs.sign == 'true'
        env:
          APP_P12_B64: ${{ secrets.APPLE_CERT_APPLICATION_P12 }}
          APP_P12_PWD: ${{ secrets.APPLE_CERT_APPLICATION_PASSWORD }}
          INSTALLER_P12_B64: ${{ secrets.APPLE_CERT_INSTALLER_P12 }}
          INSTALLER_P12_PWD: ${{ secrets.APPLE_CERT_INSTALLER_PASSWORD }}
          PKG_SIGN: ${{ steps.cfg.outputs.pkg_sign }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APP_P12_B64" | base64 -d > "$RUNNER_TEMP/app.p12"
          security import "$RUNNER_TEMP/app.p12" -k "$KEYCHAIN" -f pkcs12 \
            -P "$APP_P12_PWD" -T /usr/bin/codesign
          if [[ "$PKG_SIGN" == "true" ]]; then
            echo "$INSTALLER_P12_B64" | base64 -d > "$RUNNER_TEMP/installer.p12"
            security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -f pkcs12 \
              -P "$INSTALLER_P12_PWD" -T /usr/bin/productsign
          fi
          rm -f "$RUNNER_TEMP"/app.p12 "$RUNNER_TEMP"/installer.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          # Prepend to the existing search list instead of replacing it —
          # replacing would drop whatever keychains the runner image relies on.
          existing="$(security list-keychains -d user | tr -d '"' | xargs)"
          # shellcheck disable=SC2086  # word-splitting the list is intended
          security list-keychains -d user -s "$KEYCHAIN" $existing

      - name: Sign every nested Mach-O individually
        if: steps.cfg.outputs.sign == 'true'
        env:
          IDENTITY: ${{ secrets.APPLE_APP_SIGNING_IDENTITY }}
        run: |
          ./packaging/scripts/sign-machos.sh "$IDENTITY" packaging/entitlements.plist \
            dist/unbound-hook dist/unbound-discovery

      - name: Smoke-run both binaries (--version + sample stdin event)
        run: ./packaging/scripts/smoke-test.sh dist

      - name: Build pkg (payload + pre-warm postinstall + LaunchDaemon)
        env:
          VERSION: ${{ steps.cfg.outputs.version }}
          PKG_NAME: ${{ steps.cfg.outputs.pkg_name }}
        run: |
          set -euo pipefail
          mkdir -p out
          ./packaging/scripts/build-pkg.sh "$VERSION" dist "out/unsigned-$PKG_NAME"

      - name: Productsign pkg (Developer ID Installer)
        env:
          PKG_SIGN: ${{ steps.cfg.outputs.pkg_sign }}
          INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          PKG_NAME: ${{ steps.cfg.outputs.pkg_name }}
        run: |
          set -euo pipefail
          if [[ "$PKG_SIGN" == "true" ]]; then
            productsign --sign "$INSTALLER_IDENTITY" "out/unsigned-$PKG_NAME" "out/$PKG_NAME"
            rm "out/unsigned-$PKG_NAME"
          else
            echo "::warning::installer cert not configured — pkg ships UNSIGNED (dry-run only)"
            mv "out/unsigned-$PKG_NAME" "out/$PKG_NAME"
          fi

      # API-key flags only (--key/--key-id/--issuer): no keychain profiles on
      # ephemeral runners. --wait blocks until Apple returns a verdict.
      - name: Notarize, staple, Gatekeeper-assess
        if: steps.cfg.outputs.notarize == 'true'
        env:
          NOTARY_KEY_P8: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          PKG_NAME: ${{ steps.cfg.outputs.pkg_name }}
        run: |
          set -euo pipefail
          key_file="$RUNNER_TEMP/notary-key.p8"
          # trap, not a trailing rm: set -e would skip cleanup when submit
          # fails or the run is cancelled mid --wait, leaving the P8 on the
          # runner for the rest of its lifetime.
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$NOTARY_KEY_P8" > "$key_file"
          xcrun notarytool submit "out/$PKG_NAME" \
            --key "$key_file" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" \
            --wait --timeout 7200s # first notarization from a new Developer ID account can take ~1h; subsequent are fast
          xcrun stapler staple "out/$PKG_NAME"
          spctl -a -vv -t install "out/$PKG_NAME"

      # Live install on the runner: exercises the postinstall (pre-warm ->
      # symlink flip -> daemon bootstrap -> GC) and then the rendered
      # onboard.sh --clear fallback teardown, end to end.
      - name: Install-test pkg on runner
        env:
          PKG_NAME: ${{ steps.cfg.outputs.pkg_name }}
          VERSION: ${{ steps.cfg.outputs.version }}
          PUBLISH: ${{ steps.cfg.outputs.publish }}
        run: |
          set -euo pipefail
          sudo installer -pkg "out/$PKG_NAME" -target /
          [[ "$(readlink /opt/unbound/current)" == "/opt/unbound/$VERSION" ]]
          # Version assert: a published binary must self-identify as the
          # release version — a placeholder reporting 0.0.0-placeholder (or
          # any stale baked version) must never reach the fleet. Dry-runs
          # only warn, so the unsigned pipeline keeps working pre-Streams-A/B.
          for bin in unbound-hook unbound-discovery; do
            v_out="$(/opt/unbound/current/$bin/$bin --version)"
            echo "$bin --version -> $v_out"
            # Whole-token match: '1.2.3' must not accept a binary reporting
            # '1.2.30' or '0.0.0-placeholder'-style suffixed versions.
            if [[ " $v_out " != *" $VERSION "* ]]; then
              if [[ "$PUBLISH" == "true" ]]; then
                echo "::error::$bin reports '$v_out', not release version $VERSION — refusing to publish"
                exit 1
              fi
              echo "::warning::$bin reports '$v_out' (placeholder/dev build) — would fail a tag release"
            fi
          done
          pkgutil --pkg-info ai.getunbound.runtime
          sudo launchctl print system/ai.getunbound.discovery >/dev/null
          [[ -d /var/log/unbound && -f /etc/newsyslog.d/ai.getunbound.conf ]]
          echo "install-test OK"

      # Pull the Linux tarballs (+ .sha256) the `linux` matrix job produced into
      # out/, so the render step can bake their shas and the single S3 upload
      # loop below publishes them under macos/<version>/ — no separate Linux
      # upload, no second bucket prefix. continue-on-error: a missing arch (build
      # failed / arm64 runner absent) must not break the macOS release; its sha
      # is then empty -> onboard.sh token empty -> clean preflight skip.
      - name: Download Linux runtime tarballs
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: linux-*
          path: out
          merge-multiple: true

      - name: Render onboard.sh (version + sha + artifact URLs baked in)
        env:
          VERSION: ${{ steps.cfg.outputs.version }}
          PKG_NAME: ${{ steps.cfg.outputs.pkg_name }}
          ARTIFACT_URL: ${{ steps.cfg.outputs.artifact_url }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PKG_SIGN: ${{ steps.cfg.outputs.pkg_sign }}
        run: |
          set -euo pipefail
          pkg_sha256="$(shasum -a 256 "out/$PKG_NAME" | awk '{print $1}')"
          # Bake the Team ID assert whenever the pkg is productsigned —
          # signature presence is what the assert checks, independent of
          # notarization. Unsigned pkg => empty Team ID => assert skipped,
          # otherwise onboard.sh would reject its own artifact.
          team_id=""
          [[ "$PKG_SIGN" == "true" ]] && team_id="$TEAM_ID"
          # Everything lives under ONE release folder: macos/<version>/. The
          # Linux tarballs were downloaded into out/ above and are uploaded there
          # by the single S3 loop below.
          base="https://$ARTIFACTS_BUCKET.s3.$ARTIFACTS_REGION.amazonaws.com/macos/$VERSION"
          linux_amd64_url="$base/unbound-runtime-$VERSION-linux-amd64.tar.gz"
          linux_arm64_url="$base/unbound-runtime-$VERSION-linux-arm64.tar.gz"
          # Linux shas come from the downloaded .sha256 files (present on both
          # dry-run and publish). A missing arch (build failed / runner absent)
          # leaves its sha empty -> token empty -> that arch fails preflight
          # cleanly while macOS + the other arch ship.
          read_sha() { [[ -f "out/$1" ]] && awk '{print $1}' "out/$1" || true; }
          linux_amd64_sha="$(read_sha "unbound-runtime-$VERSION-linux-amd64.tar.gz.sha256")"
          linux_arm64_sha="$(read_sha "unbound-runtime-$VERSION-linux-arm64.tar.gz.sha256")"
          # Loud signal: continue-on-error means a failed/absent Linux arch
          # degrades silently to an empty token. Surface it so a dropped arch
          # isn't invisible (the release still ships — macOS + the other arch
          # are unaffected — but the gap is now in the log).
          [[ -n "$linux_amd64_sha" ]] || echo "::warning::no linux/amd64 runtime — its build failed or runner was unavailable; amd64 Linux installs will fail preflight"
          [[ -n "$linux_arm64_sha" ]] || echo "::warning::no linux/arm64 runtime — its build failed or runner was unavailable; arm64 Linux installs will fail preflight"
          # Every placeholder must be substituted (incl. all four Linux tokens)
          # or the guard below fails the release.
          sed -e "s|@VERSION@|$VERSION|g" \
              -e "s|@PKG_SHA256@|$pkg_sha256|g" \
              -e "s|@ARTIFACT_URL@|$ARTIFACT_URL|g" \
              -e "s|@TEAM_ID@|$team_id|g" \
              -e "s|@LINUX_AMD64_URL@|$linux_amd64_url|g" \
              -e "s|@LINUX_AMD64_SHA256@|$linux_amd64_sha|g" \
              -e "s|@LINUX_ARM64_URL@|$linux_arm64_url|g" \
              -e "s|@LINUX_ARM64_SHA256@|$linux_arm64_sha|g" \
              mdm/onboard.sh.tmpl > out/onboard.sh
          chmod +x out/onboard.sh
          bash -n out/onboard.sh
          # `! grep` would NOT fail the step under set -e (bash ignores
          # errexit for ! pipelines) — use an explicit if so an unrendered
          # @TOKEN@ really blocks the release.
          # [A-Z0-9_] (not [A-Z_]) so digit-bearing tokens like
          # @LINUX_AMD64_SHA256@ / @PKG_SHA256@ are also caught if a sed line
          # is ever dropped.
          if grep -q '@[A-Z0-9_]*@' out/onboard.sh; then
            echo "::error::unrendered placeholder left in onboard.sh"
            grep -n '@[A-Z0-9_]*@' out/onboard.sh
            exit 1
          fi
          echo "$pkg_sha256" > "out/$PKG_NAME.sha256"

      - name: Test rendered onboard.sh --clear (bash fallback teardown)
        run: |
          set -euo pipefail
          sudo bash out/onboard.sh --clear
          [[ ! -e /opt/unbound ]]
          [[ ! -f /Library/LaunchDaemons/ai.getunbound.discovery.plist ]]
          ! pkgutil --pkg-info ai.getunbound.runtime >/dev/null 2>&1
          echo "onboard --clear OK"

      - name: Package tar.gz + checksums
        env:
          TAR_NAME: ${{ steps.cfg.outputs.tar_name }}
        run: |
          set -euo pipefail
          tar -czf "out/$TAR_NAME" -C dist unbound-hook unbound-discovery
          (cd out && shasum -a 256 "$TAR_NAME" > "$TAR_NAME.sha256")
          ls -lh out/

      - name: Upload build artifacts (always, incl. dry-runs)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.cfg.outputs.artifact_name }}
          path: out/
          retention-days: 14

      # The bucket rejects overwrites (S3 conditional writes). Each object is
      # uploaded with --if-none-match '*': a 412/AccessDenied on re-publish of
      # an existing version is a HARD error demanding a version bump — never a
      # retry. Published artifacts are immutable; the sha256 baked into the
      # fleet's onboard.sh must stay true forever.
      - name: Upload to S3 (immutable, no-overwrite)
        if: steps.cfg.outputs.publish == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ARTIFACTS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ARTIFACTS_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.ARTIFACTS_REGION }}
          VERSION: ${{ steps.cfg.outputs.version }}
          PKG_NAME: ${{ steps.cfg.outputs.pkg_name }}
          TAR_NAME: ${{ steps.cfg.outputs.tar_name }}
        run: |
          set -euo pipefail
          # Explicit upload ORDER (I3): payloads + checksums first, onboard.sh
          # strictly LAST. If publishing dies halfway, the public prefix must
          # never contain an onboard.sh that points at a 404 — the script only
          # appears once everything it references exists.
          names=( "$PKG_NAME" "$PKG_NAME.sha256" "$TAR_NAME" "$TAR_NAME.sha256" )
          # Linux tarballs (downloaded from the `linux` job into out/). OPTIONAL:
          # an arch may be absent under continue-on-error — upload whatever is
          # present, BEFORE onboard.sh so it never references a missing object.
          for lt in out/unbound-runtime-"$VERSION"-linux-*.tar.gz; do
            [[ -e "$lt" ]] || continue
            b="$(basename "$lt")"; names+=( "$b" "$b.sha256" )
          done
          names+=( onboard.sh )   # strictly LAST (I3)
          for name in "${names[@]}"; do
            f="out/$name"
            [[ -f "$f" ]] || { echo "::error::expected artifact missing: $f"; exit 1; }
            key="macos/$VERSION/$name"
            if err="$(aws s3api put-object \
                  --bucket "$ARTIFACTS_BUCKET" --key "$key" --body "$f" \
                  --if-none-match '*' 2>&1 >/dev/null)"; then
              echo "uploaded s3://$ARTIFACTS_BUCKET/$key"
            else
              if echo "$err" | grep -qiE 'PreconditionFailed|412'; then
                echo "::error::s3://$ARTIFACTS_BUCKET/$key already exists — runtime-v$VERSION has been published before. Published artifacts are immutable: bump the version and cut a new tag; do NOT retry or delete."
              elif echo "$err" | grep -qi 'AccessDenied'; then
                echo "::error::S3 AccessDenied for $key — EITHER the object already exists on a deny-overwrite bucket (version already published -> bump the version) OR the ARTIFACTS_AWS creds lack PutObject / are expired. Verify credentials before assuming an immutability collision."
              else
                echo "::error::S3 upload failed for $key: $err"
              fi
              exit 1
            fi
          done

      # Stable "latest" alias for onboard.sh ONLY (WEB-4826). getunbound.ai
      # proxies /setup/mdm/onboard.sh to this object so the install one-liner
      # is version-agnostic. Copied server-side from the immutable versioned
      # object we just uploaded — same bytes, fresh headers.
      # CRITICAL: the alias is rewritten with Cache-Control: no-cache so a new
      # release is never masked by a stale cached copy — without --metadata-
      # directive REPLACE the cp would inherit the versioned object's
      # cacheable headers. Content-type is set explicitly because, unlike the
      # versioned objects (consumed by curl | bash), this `latest` object is
      # the browser-reachable URL the proxy serves, and a default
      # binary/octet-stream can trip content-sniffing/attachment behavior.
      # The versioned objects stay immutable/cacheable; only this `latest`
      # object is no-cache. The pkg/tar.gz are NOT aliased — the rendered
      # onboard.sh already bakes the versioned pkg ARTIFACT_URL, so the
      # payload stays correctly version-pinned.
      - name: Publish latest onboard.sh alias (no-cache)
        if: steps.cfg.outputs.publish == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ARTIFACTS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ARTIFACTS_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.ARTIFACTS_REGION }}
          VERSION: ${{ steps.cfg.outputs.version }}
        run: |
          set -euo pipefail
          aws s3 cp \
            "s3://$ARTIFACTS_BUCKET/macos/$VERSION/onboard.sh" \
            "s3://$ARTIFACTS_BUCKET/macos/latest/onboard.sh" \
            --metadata-directive REPLACE \
            --content-type "text/x-shellscript; charset=utf-8" \
            --cache-control "no-cache, max-age=0"
          echo "aliased s3://$ARTIFACTS_BUCKET/macos/latest/onboard.sh -> $VERSION"

      - name: Create GitHub Release
        if: steps.cfg.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.cfg.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "runtime-v$VERSION" \
            --title "macOS runtime $VERSION" \
            --notes "Universal2 macOS runtime (unbound-hook + unbound-discovery). Deploy via Jamf with the attached onboard.sh." \
            out/*.pkg out/*.tar.gz out/*.sha256 out/onboard.sh
