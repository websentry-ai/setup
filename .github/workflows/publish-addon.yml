name: publish-addon

# Builds the multi-arch Unbound container-hooks add-on image and pushes it to GHCR.
# The add-on sources the canonical hook directly from claude-code/hooks/unbound.py
# (build context = repo root), so it is always current — no vendoring.
#
# Auth uses the built-in GITHUB_TOKEN (packages: write) — no personal PAT needed.
#
# Triggers (deliberately scoped to NOT collide with this repo's own release tags,
# e.g. prod_* or generic v*):
#   - push a dedicated tag:  git tag container-addon-v0.1.0 && git push origin container-addon-v0.1.0
#   - or run manually via the Actions tab (workflow_dispatch) with a `tag` input.
on:
  push:
    tags: ["container-addon-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          # On a tag push, strip the dedicated `container-addon-v` prefix:
          #   container-addon-v0.1.0 -> 0.1.0
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME#container-addon-v}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: container-addon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/addon:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}/addon:latest
