# Rotation for Unbound runtime logs (installed to /etc/newsyslog.d/ by the
# ai.getunbound.runtime pkg postinstall). G = glob, Z = gzip old logs.
# Rotate at 5 MB, keep 5 generations.
# logfilename                       [owner:group]  mode count size(KB) when flags
/var/log/unbound/*.log              root:wheel     640  5     5120     *    GZ
